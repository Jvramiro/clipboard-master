<div class="page">
  <h1>Clipboard Master</h1>

  <div class="container">
    <h2>Clipboard</h2>
    <button (click)="pasteClipboard()">Send from Clipboard</button>
    <button (click)="copyClipboard()">Copy to Clipboard</button>

    <textarea [(ngModel)]="inputText"></textarea>
    <button (click)="sendText()">Send from TextBox</button>

    <textarea class="server-text" [value]="serverText" readonly></textarea>
  </div>

  <div class="container disabled">
    <h2>Files</h2>
    <button disabled>Paste File</button>
    <button disabled>Copy File</button>
  </div>
</div>
