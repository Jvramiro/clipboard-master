<div class="page">
  <h1>Clipboard Master</h1>

  <div class="container">
    <h2>Clipboard</h2>
    <button (click)="pasteClipboard()">Paste Clipboard</button>
    <button (click)="copyClipboard()">Copy Clipboard</button>
  </div>

  <div class="container disabled">
    <h2>Files</h2>
    <button disabled>Paste File</button>
    <button disabled>Copy File</button>
  </div>

  <p class="status">{{ statusMessage }}</p>
</div>
